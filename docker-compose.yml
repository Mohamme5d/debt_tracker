# ─────────────────────────────────────────────────────────────────────────────
# Ijari — Docker Compose
#
# Default stack: MySQL (local container) + Mailpit + API + Web + Nginx
#
# Override the DB connection for an external server:
#   MYSQL_CONN="Server=host;Port=3306;Database=db;Uid=user;Pwd=pass;" docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: ijari
      MYSQL_USER: ijari
      MYSQL_PASSWORD: ijari123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ijari", "-pijari123"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Mail (dev/staging — swap for real SMTP in production) ──────────────────
  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "8026:8025"   # web UI

  # ── ASP.NET Core API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      # External database server (override with MYSQL_CONN env var)
      ConnectionStrings__Default: "${MYSQL_CONN:-Server=192.250.229.218;Port=3306;Database=nexisco7_Ijari;Uid=nexisco7_Ijari;Pwd=o6lo!381X;}"

      Jwt__Secret: "${JWT_SECRET:-super-secret-key-change-in-production-32chars!!}"
      Jwt__Issuer: "ijari-api"
      Jwt__Audience: "ijari-clients"
      Email__SmtpHost: "mailpit"
      Email__SmtpPort: "1025"
      Email__From: "noreply@ijari.app"
      Email__FromName: "Ijari"
      Cors__Origins__0: "${CORS_ORIGIN_0:-https://ijari.nexiscore.com}"
      Cors__Origins__1: "${CORS_ORIGIN_1:-http://localhost:4200}"
      Admin__Email: "${ADMIN_EMAIL:-admin@ijari.app}"
      Admin__Password: "${ADMIN_PASSWORD:-Admin@12345}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
    volumes:
      - api_logs:/app/logs

  # ── Angular Web App ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  mysqldata:
  api_logs:
