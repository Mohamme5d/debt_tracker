# ─────────────────────────────────────────────────────────────────────────────
# Ijari — Docker Compose
#
# DATABASE PROVIDER — set Database__Provider + the matching service below.
# Supported values: PostgreSQL | MySQL | SqlServer
#
# Quick-switch guide:
#   PostgreSQL (default) → keep as-is
#   MySQL                → set Database__Provider=MySQL, enable mysql service,
#                          set ConnectionStrings__MySQL, disable postgres service
#   SQL Server           → set Database__Provider=SqlServer, enable mssql service,
#                          set ConnectionStrings__SqlServer, disable postgres service
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (default) ────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ijari
      POSTGRES_USER: ijari
      POSTGRES_PASSWORD: ijari123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ijari"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MySQL 8 (optional — uncomment + disable postgres to switch) ─────────────
  # mysql:
  #   image: mysql:8
  #   restart: always
  #   environment:
  #     MYSQL_DATABASE: ijari
  #     MYSQL_USER: ijari
  #     MYSQL_PASSWORD: ijari123
  #     MYSQL_ROOT_PASSWORD: root123
  #   volumes:
  #     - mysqldata:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ijari", "-pijari123"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10

  # ── SQL Server 2022 (optional — uncomment + disable postgres to switch) ─────
  # mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   restart: always
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     SA_PASSWORD: "YourStrong@Passw0rd"
  #     MSSQL_PID: "Express"
  #   volumes:
  #     - mssqldata:/var/opt/mssql
  #   healthcheck:
  #     test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' -No"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  # ── Mail (dev/staging — swap for real SMTP in production) ──────────────────
  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "8026:8025"   # web UI

  # ── ASP.NET Core API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    # on-failure lets Docker restart the API if it exits while the DB is still
    # starting up. The startup code already retries internally (10× / 3s each).
    restart: on-failure
    environment:
      # ── Database provider ──────────────────────────────────────────────────
      Database__Provider: "${DB_PROVIDER:-PostgreSQL}"

      # ── Connection strings (only the selected provider is used) ───────────
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=ijari;Username=ijari;Password=ijari123"
      ConnectionStrings__MySQL: "Server=mysql;Port=3306;Database=ijari;Uid=ijari;Pwd=ijari123;"
      ConnectionStrings__SqlServer: "Server=mssql,1433;Database=ijari;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"

      # ── Legacy fallback (kept for backwards compatibility) ────────────────
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=ijari;Username=ijari;Password=ijari123"

      Jwt__Secret: "${JWT_SECRET:-super-secret-key-change-in-production-32chars!!}"
      Jwt__Issuer: "ijari-api"
      Jwt__Audience: "ijari-clients"
      Email__SmtpHost: "mailpit"
      Email__SmtpPort: "1025"
      Email__From: "noreply@ijari.app"
      Email__FromName: "Ijari"
      # Comma-separated list of allowed origins, or * for any.
      # Override with: Cors__Origins__0=https://app.example.com Cors__Origins__1=https://www.example.com
      Cors__Origins__0: "${CORS_ORIGIN_0:-https://ijari.nexiscore.com}"
      Cors__Origins__1: "${CORS_ORIGIN_1:-http://localhost:4200}"
      Admin__Email: "${ADMIN_EMAIL:-admin@ijari.app}"
      Admin__Password: "${ADMIN_PASSWORD:-Admin@12345}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
    volumes:
      - api_logs:/app/logs
    # When switching providers, update this to point at the correct DB service:
    #   PostgreSQL → postgres / MySQL → mysql / SQL Server → mssql
    depends_on:
      postgres:
        condition: service_healthy

  # ── Angular Web App ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - api

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  pgdata:
  api_logs:
  # mysqldata:
  # mssqldata:
