name: debt_tracker
description: Personal debts & loans tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  go_router: ^13.2.0
  flutter_contacts: ^1.1.7+1
  intl: ^0.20.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.11

flutter:
  generate: true
  uses-material-design: true
