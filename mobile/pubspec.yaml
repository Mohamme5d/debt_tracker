name: rent_manager
description: Apartment rent management app with bilingual Arabic/English UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  go_router: ^13.2.0
  pdf: ^3.10.8
  printing: ^5.13.1
  google_fonts: ^6.2.1
  intl: ^0.20.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  dropdown_search: ^5.0.6
  flutter_native_splash: ^2.4.1
  package_info_plus: ^8.0.0
  flutter_slidable: ^3.1.1
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  excel: ^4.0.6
  # API & Auth
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  pretty_dio_logger: ^1.4.0
  local_auth: ^2.3.0
  pinput: ^3.0.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
    - assets/fonts/
